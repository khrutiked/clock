<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบนาฬิกาโรงเรียนสิรินธร จังหวัดสุรินทร์</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Prompt', sans-serif;
        }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen flex flex-col justify-between p-6 transition-all duration-500">

    <header class="w-full max-w-5xl mx-auto flex flex-col md:flex-row justify-between items-center border-b border-gray-800 pb-4 gap-4">
        <div class="flex items-center gap-4">
            <div class="w-12 h-12 rounded-full bg-red-600 flex items-center justify-center font-bold text-white shadow-lg shadow-red-600/50">
                ส.ธ.
            </div>
            <div>
                <h1 class="text-xl font-bold tracking-wide text-white">โรงเรียนสิรินธร จังหวัดสุรินทร์</h1>
                <p class="text-xs text-gray-400 font-light">ระบบนาฬิกาดิจิทัลส่วนกลาง (Digital Clock System)</p>
            </div>
        </div>
        
        <button id="fullscreenBtn" class="flex items-center gap-2 bg-white/10 hover:bg-red-600 hover:text-white text-gray-200 font-medium py-2 px-4 rounded-xl border border-white/20 transition-all duration-300 backdrop-blur-sm cursor-pointer shadow-sm">
            <svg id="fullscreenIcon" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-5h-4m4 0v4m0-4l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4" />
            </svg>
            <span id="fullscreenText" class="text-sm">เต็มหน้าจอ</span>
        </button>
    </header>

    <main class="flex-grow flex flex-col justify-center items-center my-8">
        <div class="text-center w-full max-w-4xl px-4">
            <div id="dateDisplay" class="text-lg md:text-2xl font-medium tracking-widest text-red-500 uppercase mb-2 drop-shadow-[0_2px_8px_rgba(239,68,68,0.3)]">
                วันพฤหัสบดีที่ 1 มกราคม 2570
            </div>
            
            <div class="relative bg-black/40 border border-gray-800/80 rounded-3xl p-8 md:p-16 shadow-2xl backdrop-blur-md">
                <div class="absolute -top-px left-10 right-10 h-px bg-gradient-to-r from-transparent via-red-500 to-transparent"></div>
                
                <div id="clockDisplay" class="font-bold text-6xl sm:text-7xl md:text-9xl lg:text-10xl tracking-tight text-white select-none variant-numeric tabular-nums">
                    00:00:00
                </div>
            </div>
        </div>
    </main>

    <footer class="w-full max-w-5xl mx-auto border-t border-gray-800 pt-4 text-center md:text-right">
        <p class="text-xs text-gray-500 font-light">
            Designed & Developed by <span class="text-red-500 font-semibold">ครูติ๊ก (Full Stack & UX/UI Expert)</span>
        </p>
    </footer>

    <script>
        // 1. ฟังก์ชันอัปเดตนาฬิกาและวันที่
        function updateClock() {
            const now = new Date();
            
            // ตั้งค่ารูปแบบเวลา (HH:MM:SS)
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            
            document.getElementById('clockDisplay').textContent = `${hours}:${minutes}:${seconds}`;
            
            // ตั้งค่ารูปแบบวันที่ภาษาไทย
            const days = ['วันอาทิตย์', 'วันจันทร์', 'วันอังคาร', 'วันพุธ', 'วันพฤหัสบดี', 'วันศุกร์', 'วันเสาร์'];
            const months = [
                'มกราคม', 'กุมภาพันธ์', 'มีนาคม', 'เมษายน', 'พฤษภาคม', 'มิถุนายน', 
                'กรกฎาคม', 'สิงหาคม', 'กันยายน', 'ตุลาคม', 'พฤศจิกายน', 'ธันวาคม'
            ];
            
            const dayName = days[now.getDay()];
            const dateNum = now.getDate();
            const monthName = months[now.getMonth()];
            const thaiYear = now.getFullYear() + 543;
            
            document.getElementById('dateDisplay').textContent = `${dayName}ที่ ${dateNum} ${monthName} ${thaiYear}`;
        }

        // อัปเดตเวลาทุกๆ 1 วินาที
        setInterval(updateClock, 1000);
        updateClock(); // เรียกใช้งานทันทีเมื่อโหลดหน้าแรก

        // 2. ฟังก์ชันระบบ Full Screen
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const fullscreenText = document.getElementById('fullscreenText');
        const fullscreenIcon = document.getElementById('fullscreenIcon');

        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                // เปิดโหมด Full Screen
                document.documentElement.requestFullscreen().then(() => {
                    updateFullscreenUI(true);
                }).catch(err => {
                    console.error(`Error attempting to enable full-screen mode: ${err.message}`);
                });
            } else {
                // ออกจากโหมด Full Screen
                document.exitFullscreen().then(() => {
                    updateFullscreenUI(false);
                });
            }
        });

        // ดักจับการเปลี่ยนสถานะกรณีผู้ใช้กด Esc เอง
        document.addEventListener('fullscreenchange', () => {
            if (document.fullscreenElement) {
                updateFullscreenUI(true);
            } else {
                updateFullscreenUI(false);
            }
        });

        // ฟังก์ชันปรับเปลี่ยน UI ของปุ่มตามสถานะหน้าจอ
        function updateFullscreenUI(isFull) {
            if (isFull) {
                fullscreenText.textContent = 'ออกจากเต็มหน้าจอ';
                // เปลี่ยนเป็นไอคอน Shrink
                fullscreenIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4l5 5m0 0V4m0 5H4m16-5l-5 5m0 0v-5m0 5h5M4 20l5-5m0 0v5m0-5H4m16 0l-5-5m0 0v5m0-5h5" />';
                fullscreenBtn.classList.replace('bg-white/10', 'bg-red-600');
            } else {
                fullscreenText.textContent = 'เต็มหน้าจอ';
                // เปลี่ยนเป็นไอคอน Expand
                fullscreenIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-5h-4m4 0v4m0-4l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4" />';
                fullscreenBtn.classList.replace('bg-red-600', 'bg-white/10');
            }
        }
    </script>
</body>
</html>
